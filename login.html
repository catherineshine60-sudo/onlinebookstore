<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Login & Signup</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

:root{
    --primary:#2563eb;
    --primary-dark:#1d4ed8;
    --bg:#f4f7fc;
    --card:#ffffff;
    --text:#111827;
    --text-light:#6b7280;
    --border:#e5e7eb;
    --success:#10b981;
    --shadow:0 20px 40px rgba(0,0,0,0.08);
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#dbeafe,#eff6ff);
    padding:20px;
}

.container{
    width:100%;
    max-width:950px;
    min-height:600px;
    background:var(--card);
    border-radius:24px;
    overflow:hidden;
    box-shadow:var(--shadow);
    position:relative;
}

.form-container{
    position:absolute;
    top:0;
    height:100%;
    transition:all .6s ease-in-out;
}

.sign-in-container{
    left:0;
    width:50%;
    z-index:2;
}

.container.active .sign-in-container{
    transform:translateX(100%);
}

.sign-up-container{
    left:0;
    width:50%;
    opacity:0;
    z-index:1;
}

.container.active .sign-up-container{
    transform:translateX(100%);
    opacity:1;
    z-index:5;
}

form{
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    padding:0 50px;
    height:100%;
    text-align:center;
}

h1{
    color:var(--text);
    margin-bottom:10px;
}

.subtitle{
    color:var(--text-light);
    margin-bottom:25px;
    font-size:14px;
}

.input-group{
    width:100%;
    position:relative;
    margin-bottom:16px;
}

.input-group input{
    width:100%;
    padding:14px 18px;
    border:1px solid var(--border);
    border-radius:12px;
    outline:none;
    font-size:15px;
    transition:.3s;
}

.input-group input:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(37,99,235,.1);
}

button{
    border:none;
    outline:none;
    padding:14px 40px;
    border-radius:12px;
    background:var(--primary);
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:var(--primary-dark);
    transform:translateY(-2px);
}

a{
    text-decoration:none;
    color:var(--primary);
    font-size:14px;
    margin:10px 0 20px;
}

.overlay-container{
    position:absolute;
    top:0;
    left:50%;
    width:50%;
    height:100%;
    overflow:hidden;
    transition:transform .6s ease-in-out;
    z-index:100;
}

.container.active .overlay-container{
    transform:translateX(-100%);
}

.overlay{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:#fff;
    position:relative;
    left:-100%;
    height:100%;
    width:200%;
    transform:translateX(0);
    transition:transform .6s ease-in-out;
}

.container.active .overlay{
    transform:translateX(50%);
}

.overlay-panel{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    padding:0 40px;
    text-align:center;
    top:0;
    height:100%;
    width:50%;
}

.overlay-left{
    transform:translateX(-20%);
}

.container.active .overlay-left{
    transform:translateX(0);
}

.overlay-right{
    right:0;
    transform:translateX(0);
}

.container.active .overlay-right{
    transform:translateX(20%);
}

.overlay h1{
    color:#fff;
}

.overlay p{
    margin:15px 0 25px;
    line-height:1.6;
}

.ghost{
    background:transparent;
    border:2px solid #fff;
}

.message{
    margin-top:15px;
    font-size:14px;
    color:var(--success);
    font-weight:500;
}

@media(max-width:768px){

    .container{
        min-height:850px;
    }

    .form-container,
    .sign-in-container,
    .sign-up-container{
        width:100%;
        height:50%;
    }

    .overlay-container{
        left:0;
        top:50%;
        width:100%;
        height:50%;
    }

    .container.active .overlay-container{
        transform:translateY(-100%);
    }

    .overlay{
        width:100%;
        height:200%;
        left:0;
        top:-100%;
    }

    .container.active .overlay{
        transform:translateY(50%);
    }

    .overlay-panel{
        width:100%;
        height:50%;
    }

    .overlay-left{
        top:0;
    }

    .overlay-right{
        bottom:0;
    }

    .container.active .sign-up-container{
        transform:translateY(100%);
    }

    .container.active .sign-in-container{
        transform:translateY(100%);
    }
}
</style>
</head>

<body>

<div class="container" id="container">

    <!-- Sign Up -->
    <div class="form-container sign-up-container">
        <form id="signupForm">
            <div class="brand">
    <div class="logo">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <h2>LunaBookNest</h2>
</div>

<h1>Create Account</h1>
            <p class="subtitle">Join our platform today</p>

            <div class="input-group">
                <input type="text" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="email" placeholder="Email Address" required>
            </div>

            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>

            <button type="submit" onclick="window.location.href='index.html'">signup</button>
            <div class="message" id="signupMessage"></div>
        </form>
    </div>

    <!-- Login -->
    <div class="form-container sign-in-container">
        <form id="loginForm">
            <div class="brand">
    <div class="logo">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <h2>LunaBookNest</h2>
</div>

<h1>Welcome Back</h1>
            <p class="subtitle">Login to continue</p>

            <div class="input-group">
                <input type="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>

            <a href="#">Forgot Password?</a>

            <button type="submit"onclick="window.location.href='index.html'">Login</button>
            <div class="message" id="loginMessage"></div>
        </form>
    </div>

    <!-- Overlay -->
    <div class="overlay-container">
        <div class="overlay">

            <div class="overlay-panel overlay-left">
                <h1>Welcome Back!</h1>
                <p>
                    Already have an account?
                    Login and continue your journey.
                </p>
                <button class="ghost" id="signIn">
                    Login
                </button>
            </div>

            <div class="overlay-panel overlay-right">
                <h1>Hello, Friend!</h1>
                <p>
                    Enter your details and create a new account.
                </p>
                <button class="ghost" id="signUp">
                    Sign Up
                </button>
            </div>

        </div>
    </div>

</div>

<script>
const container = document.getElementById('container');
const signUpBtn = document.getElementById('signUp');
const signInBtn = document.getElementById('signIn');

signUpBtn.addEventListener('click', () => {
    container.classList.add("active");
});

signInBtn.addEventListener('click', () => {
    container.classList.remove("active");
});
document.getElementById("signupForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.querySelector(".sign-up-container input[type='text']").value;
    const email = document.querySelector(".sign-up-container input[type='email']").value;
    const password = document.querySelector(".sign-up-container input[type='password']").value;

    const user = {
        username: username,
        email: email,
        password: password
    };

    localStorage.setItem("user", JSON.stringify(user));

    window.location.href = "profile.html";
});
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.querySelector(".sign-in-container input[type='email']").value;
    const password = document.querySelector(".sign-in-container input[type='password']").value;

    const savedUser = JSON.parse(localStorage.getItem("user"));

    if (
        savedUser &&
        savedUser.email === email &&
        savedUser.password === password
    ) {
        // Save currently logged-in user
        localStorage.setItem("currentUser", JSON.stringify(savedUser));

        window.location.href = "profile.html";
    } else {
        alert("Invalid email or password!");
    }
});
</script>

</body>
</html>
